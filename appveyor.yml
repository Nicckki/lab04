version: 1.0.{build}

image: Visual Studio 2022

environment:
  matrix:
    # 1. MSVC (оставим один вариант для примера)
    - COMPILER: msvc
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      PLATFORM: x64
      CONFIGURATION: Release
      
    # 2. MinGW (GCC for Windows)
    - COMPILER: mingw
      CMAKE_GENERATOR: "MinGW Makefiles"
      CONFIGURATION: Release
      MINGW_PATH: C:\mingw-w64\x86_64-8.1.0-posix-seh-rt_v6-rev0\mingw64\bin
      
    # 3. Clang (через ClangCL в Visual Studio)
    - COMPILER: clang
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      PLATFORM: x64
      CONFIGURATION: Release
      EXTRA_CMAKE_FLAGS: "-T ClangCL"

install:
  - if "%COMPILER%"=="mingw" set PATH=%MINGW_PATH%;%PATH%

build_script:
  - echo "Building with %COMPILER%"
  - mkdir build
  - cd build
  - if "%COMPILER%"=="mingw" ( cmake -G "%CMAKE_GENERATOR%" -DCMAKE_BUILD_TYPE=%CONFIGURATION% .. )
  - if "%COMPILER%"=="msvc" ( cmake -G "%CMAKE_GENERATOR%" -A %PLATFORM% .. )
  - if "%COMPILER%"=="clang" ( cmake -G "%CMAKE_GENERATOR%" -A %PLATFORM% %EXTRA_CMAKE_FLAGS% .. )
  - cmake --build . --config %CONFIGURATION%
  - cd ..

test_script:
  - cd build\%CONFIGURATION%
  - hello_world.exe
  - echo 1 5 -6 | solver_app.exe
